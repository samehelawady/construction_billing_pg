{% extends "admin/change_form.html" %}
{% load i18n admin_urls %}

{% block submit_buttons_bottom %}
{{ block.super }}
{% if show_link_deduction %}
<div style="margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 6px; border-left: 4px solid #1565c0;">
    <p style="margin: 0 0 8px 0; font-size: 12px; color: #1565c0; font-weight: bold;">
        💡 This payment was marked as "Paid Through Client" but not yet linked.
    </p>
    <a href="{{ link_deduction_url }}" class="button"
       style="background: #1565c0; color: white; padding: 8px 16px; border-radius: 4px;
              text-decoration: none; font-weight: 600; display: inline-block;">
        🔗 Link to Client Invoice Deduction
    </a>
</div>
{% endif %}
{% endblock %}
